<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação 2 Bimestre</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

    <header>
        <h1 class="title-login">Portal do Candidato - ENEM</h1>
    </header>

    <main>
        <form class="container">
            <div class="input-label">
                <label for="email">E-mail </label>
                <input class="input-cont" type="email" name="email" required>
            </div>

            <div class="input-label">
                <label for="password">Senha</label>
                <input class="input-cont-senha" type="password" name="password" required>
            </div>
            
            <button class="btn-login">Entrar</button>

            <span class="mensagem"></span>

        </form>
    </main>

    <footer class="rodape">
        <p class="p-text">© 2026 Pedro Henrique. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
